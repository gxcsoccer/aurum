# ============================================================
# Aurum Configuration — 多资产轮动版
# ============================================================

# 资产池（7 核心资产，经验证的最优配置）
universe:
  - SPY    # 美股大盘
  - QQQ    # 纳斯达克
  - EFA    # 国际发达市场
  - EEM    # 新兴市场
  - TLT    # 长期美国国债
  - GLD    # 黄金
  - SHY    # 短期国债（现金等价）
  # 备选行业 ETF（实验表明 50 轮进化后效果不如 7 资产版）
  # - XLK  # 科技（与 QQQ 高度相关）
  # - XLE  # 能源
  # - XLF  # 金融
  # - XLV  # 医疗保健

cash_asset: "SHY"
benchmark: "SPY"

# 评估期
eval_start: "2008-01-01"
eval_end: "2024-12-31"

# 保留期
holdout_start: "2025-01-01"
holdout_end: "2025-12-31"

# Walk-forward 子期间
sub_period: "yearly"

# 交易成本（每次切换资产的成本）
cost_per_trade: 0.001

# 评分硬约束
max_drawdown_limit: 0.30
min_sharpe: 0.0

# ============================================================
# LLM 设置
# ============================================================
llm:
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  api_key_env: "DASHSCOPE_API_KEY"
  models:
    - "qwen3.5-plus"
  max_tokens: 4096
  temperature: 0.7

# ============================================================
# 进化循环设置
# ============================================================
loop:
  iterations: 200
  history_window: 30
