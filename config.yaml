# ============================================================
# Aurum Configuration — 多资产轮动版
# ============================================================

# 资产池（7 核心资产，经验证的最优配置）
universe:
  - SPY    # 美股大盘
  - QQQ    # 纳斯达克
  - EFA    # 国际发达市场
  - EEM    # 新兴市场
  - TLT    # 长期美国国债
  - GLD    # 黄金
  - SHY    # 短期国债（现金等价）
  # 备选行业 ETF（实验表明 50 轮进化后效果不如 7 资产版）
  # - XLK  # 科技（与 QQQ 高度相关）
  # - XLE  # 能源
  # - XLF  # 金融
  # - XLV  # 医疗保健

cash_asset: "SHY"
benchmark: "SPY"

# 执行层现金替代：策略信号输出 SHY 时，实际交易应买入 SGOV（iShares 0-3 Month Treasury Bond ETF）
# 原因：SGOV 年化收益更高（2.9% vs 1.5%）、波动率低 8 倍（0.24% vs 1.83%）、回撤几乎为零（-0.03% vs -5.71%）
# 但 SGOV 上市于 2020-06，无法用于 2008+ 回测，因此策略层仍使用 SHY 的价格数据计算动量信号
# 映射关系：SHY（策略信号）→ SGOV（实际执行）
execution_cash_substitute: "SGOV"

# 评估期
eval_start: "2008-01-01"
eval_end: "2024-12-31"

# 保留期
holdout_start: "2025-01-01"
holdout_end: "2025-12-31"

# Walk-forward 子期间
sub_period: "yearly"

# 交易成本（每次切换资产的成本）
cost_per_trade: 0.001

# 评分硬约束
max_drawdown_limit: 0.30
min_sharpe: 0.0

# ============================================================
# LLM 设置
# ============================================================
llm:
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  api_key_env: "DASHSCOPE_API_KEY"
  models:
    - "qwen3.5-plus"
  max_tokens: 4096
  temperature: 0.7

# ============================================================
# 进化循环设置
# ============================================================
loop:
  iterations: 200
  history_window: 30
